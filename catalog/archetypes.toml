requires_cloudflare_posture = false
allowed_cloudflare_postures = ["none"]
requires_release_evidence = false
requires_artifact_classification = true

[[archetypes]]
id = "generic-active-repo"
title = "Generic active repo"
requires_canonical_commands = true

schema_version = "0.1.0"

[[archetypes]]
id = "cloudflare-product"
title = "Cloudflare-backed product repo"
requires_canonical_commands = true
requires_cloudflare_posture = true
allowed_cloudflare_postures = [
  "cfctl-native",
  "cfctl-aware-wrapper",
  "legacy/raw-wrangler-exception",
  "none",
]
requires_release_evidence = true
requires_artifact_classification = true

